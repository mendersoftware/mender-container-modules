stages:
  - test

variables:
  # src/*_base.sh files are included in other files to produce full standalone
  # shell scripts and while they have a license, we don't want such license to
  # appear in the resulting shell scripts and the license headers checker is not
  # smart enough to handle that
  LICENSE_HEADERS_IGNORE_FILES_REGEXP: '.*src/.*_base\.sh'

include:
  - component: gitlab.com/Northern.tech/Mender/mendertesting/commit-lint@master
  - project: 'Northern.tech/Mender/mendertesting'
    file:
      - '.gitlab-ci-check-license.yml'
      - '.gitlab-ci-github-status-updates.yml'
      - '.gitlab-ci-check-shell-format.yml'
  - component: gitlab.com/Northern.tech/Mender/mendertesting/commit-lint@master

test:check-shell-formatting:
  before_script:
    - apk add --no-cache m4 make
    - make build
    - SHELL_SCRIPTS="src/docker-compose src/gen_docker-compose tests/test_docker-compose.sh"

test:unit-tests:
  image: ${CI_DEPENDENCY_PROXY_DIRECT_GROUP_IMAGE_PREFIX}/debian:13
  tags:
    - oslo-xps
  before_script:
    - apt-get update
    - apt-get -yyq install bash jq tar gzip m4 make
  script:
    - make build
    - tests/test_docker-compose.sh
